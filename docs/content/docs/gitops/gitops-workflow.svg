<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 330" fill="none">
  <style>
    .phase { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; fill: #6B7280; }
    .badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; }
    .trans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 9px; font-weight: 600; }
    .db-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 500; fill: #374151; }
    .connector { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 9px; fill: #9CA3AF; }
  </style>

  <!-- Background -->
  <rect width="1020" height="330" rx="12" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ═══════════════════════════════ -->
  <!-- COL 1: DEVELOP (18–178)        -->
  <!-- ═══════════════════════════════ -->

  <text x="98" y="28" text-anchor="middle" class="phase" fill="#374151">DEVELOP</text>

  <g transform="translate(18, 42)">
    <rect x="0" y="0" width="160" height="68" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <rect x="10" y="10" width="34" height="18" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="27" y="23" text-anchor="middle" class="badge" fill="#6B7280">GIT</text>
    <text x="10" y="44" class="title" fill="#111827">Write SQL files</text>
    <text x="10" y="60" class="desc">migration or schema</text>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- TRANSITION 1 (178–290)         -->
  <!-- ═══════════════════════════════ -->

  <line x1="178" y1="76" x2="288" y2="76" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="284,71 294,76 284,81" fill="#D1D5DB"/>
  <rect x="193" y="82" width="84" height="18" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="235" y="94" text-anchor="middle" class="trans" fill="#4F46E5">PR/MR created</text>

  <!-- ═══════════════════════════════ -->
  <!-- COL 2: CI (296–586)            -->
  <!-- ═══════════════════════════════ -->

  <text x="441" y="28" text-anchor="middle" class="phase" fill="#4F46E5">CI</text>

  <rect x="296" y="38" width="290" height="272" rx="10" fill="white" stroke="#C7D2FE" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Git row -->
  <g transform="translate(310, 52)">
    <rect x="0" y="0" width="262" height="48" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="10" y="12" width="34" height="18" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="27" y="25" text-anchor="middle" class="badge" fill="#6B7280">GIT</text>
    <text x="52" y="24" class="title" fill="#111827" font-size="12">Create Pull Request</text>
    <text x="52" y="39" class="desc">Open PR/MR with SQL changes</text>
  </g>

  <!-- Arrow down -->
  <line x1="441" y1="100" x2="441" y2="126" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="436,123 441,132 446,123" fill="#D1D5DB"/>
  <text x="461" y="118" class="connector">triggers</text>

  <!-- Bytebase row -->
  <g transform="translate(310, 134)">
    <rect x="0" y="0" width="262" height="48" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <rect x="10" y="12" width="58" height="18" rx="4" fill="#4F46E5"/>
    <text x="39" y="25" text-anchor="middle" class="badge" fill="white">BYTEBASE</text>
    <text x="76" y="24" class="title" fill="#312E81" font-size="12">SQL Review</text>
    <text x="76" y="39" class="desc" fill="#4338CA">Check syntax, lint, enforce policy</text>
  </g>

  <!-- Arrow down -->
  <line x1="441" y1="182" x2="441" y2="208" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="436,205 441,214 446,205" fill="#D1D5DB"/>

  <!-- Result row -->
  <g transform="translate(310, 216)">
    <rect x="0" y="0" width="262" height="44" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="131" y="18" text-anchor="middle" class="desc" fill="#166534" font-weight="500" font-size="11">Results posted to PR</text>
    <text x="131" y="34" text-anchor="middle" class="desc" fill="#15803D" font-size="10">Blocks merge if issues found</text>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- TRANSITION 2 (586–700)         -->
  <!-- ═══════════════════════════════ -->

  <line x1="586" y1="76" x2="698" y2="76" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="694,71 704,76 694,81" fill="#D1D5DB"/>
  <rect x="601" y="82" width="84" height="18" rx="9" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="643" y="94" text-anchor="middle" class="trans" fill="#166534">PR/MR merged</text>

  <!-- ═══════════════════════════════ -->
  <!-- COL 3: CD (706–1002)           -->
  <!-- ═══════════════════════════════ -->

  <text x="854" y="28" text-anchor="middle" class="phase" fill="#059669">CD</text>

  <rect x="706" y="38" width="296" height="272" rx="10" fill="white" stroke="#A7F3D0" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Git row -->
  <g transform="translate(720, 52)">
    <rect x="0" y="0" width="268" height="48" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="10" y="12" width="34" height="18" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
    <text x="27" y="25" text-anchor="middle" class="badge" fill="#6B7280">GIT</text>
    <text x="52" y="24" class="title" fill="#111827" font-size="12">Merge to branch</text>
    <text x="52" y="39" class="desc">Webhook notifies Bytebase</text>
  </g>

  <!-- Arrow down -->
  <line x1="854" y1="100" x2="854" y2="126" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="849,123 854,132 859,123" fill="#D1D5DB"/>
  <text x="874" y="118" class="connector">triggers</text>

  <!-- Bytebase row -->
  <g transform="translate(720, 134)">
    <rect x="0" y="0" width="268" height="48" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <rect x="10" y="12" width="58" height="18" rx="4" fill="#4F46E5"/>
    <text x="39" y="25" text-anchor="middle" class="badge" fill="white">BYTEBASE</text>
    <text x="76" y="24" class="title" fill="#312E81" font-size="12">Create Rollout</text>
    <text x="76" y="39" class="desc" fill="#4338CA">Plan and stage changes</text>
  </g>

  <!-- Arrow down -->
  <line x1="854" y1="182" x2="854" y2="212" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="849,209 854,218 859,209" fill="#D1D5DB"/>
  <text x="874" y="204" class="connector">apply</text>

  <!-- Databases section -->
  <g transform="translate(720, 220)">
    <rect x="0" y="0" width="268" height="78" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="134" y="16" text-anchor="middle" class="phase" fill="#6B7280">DATABASES</text>

    <!-- Dev DB -->
    <g transform="translate(10, 26)">
      <rect x="0" y="0" width="76" height="42" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <path d="M10,14 C10,11 16,8 22,8 C28,8 34,11 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#E5E7EB"/>
      <path d="M10,14 L10,26 C10,29 16,32 22,32 C28,32 34,29 34,26 L34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#F3F4F6"/>
      <path d="M10,14 C10,17 16,20 22,20 C28,20 34,17 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="none"/>
      <text x="44" y="24" class="db-label">Dev</text>
    </g>

    <!-- Staging DB -->
    <g transform="translate(96, 26)">
      <rect x="0" y="0" width="76" height="42" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <path d="M10,14 C10,11 16,8 22,8 C28,8 34,11 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#E5E7EB"/>
      <path d="M10,14 L10,26 C10,29 16,32 22,32 C28,32 34,29 34,26 L34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#F3F4F6"/>
      <path d="M10,14 C10,17 16,20 22,20 C28,20 34,17 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="none"/>
      <text x="40" y="24" class="db-label">Staging</text>
    </g>

    <!-- Prod DB -->
    <g transform="translate(182, 26)">
      <rect x="0" y="0" width="76" height="42" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <path d="M10,14 C10,11 16,8 22,8 C28,8 34,11 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#E5E7EB"/>
      <path d="M10,14 L10,26 C10,29 16,32 22,32 C28,32 34,29 34,26 L34,14" stroke="#9CA3AF" stroke-width="0.8" fill="#F3F4F6"/>
      <path d="M10,14 C10,17 16,20 22,20 C28,20 34,17 34,14" stroke="#9CA3AF" stroke-width="0.8" fill="none"/>
      <text x="40" y="24" class="db-label">Prod</text>
    </g>
  </g>
</svg>
